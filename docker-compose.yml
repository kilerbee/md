services:
  postgres:
    image: postgres:16-alpine
    container_name: muzicki-dogadjaji-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: muzicki_dogadjaji
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
